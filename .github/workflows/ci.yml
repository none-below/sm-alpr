name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install Chromium for Playwright
        run: uv run playwright install chromium

      - name: PII scan on changed PDFs
        run: |
          uv run python scripts/pii_scan.py --files $(git diff --name-only origin/main...HEAD | grep -i '\.pdf$' || echo "")
        continue-on-error: true

      - name: Parse transparency portal data
        run: uv run python scripts/flock_transparency.py parse

      - name: Build sharing graph
        run: uv run python scripts/build_sharing_graph.py

      - name: Build agency registry
        run: uv run python scripts/build_agency_registry.py --merge

      - name: Build map
        run: uv run python scripts/build_map.py

      - name: Build findings PDF
        run: uv run python scripts/md_to_pdf.py

      - name: Verify docs build
        run: |
          test -f docs/sharing_map.html
          test -f docs/data/map_data.json
          test -f docs/js/map.js
          echo "All docs artifacts built successfully"
