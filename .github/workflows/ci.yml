name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Install Tesseract (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr
          version: 1.0

      - name: Generate OCR sidecars for changed PDFs
        run: |
          PDF_FILES=$(git diff --name-only origin/main...HEAD -- 'assets/' | grep -i '\.pdf$' || true)
          if [ -n "$PDF_FILES" ]; then
            uv run python scripts/ocr_sidecar.py --files $PDF_FILES
          else
            echo "No PDF changes in assets/, skipping OCR sidecars"
          fi

      - name: Commit OCR sidecars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'assets/**/*.txt'
          if git diff --cached --quiet; then
            echo "No new sidecars to commit"
          else
            git commit -m "chore: generate OCR sidecars for new PDFs"
            git push
          fi

      - name: PII scan on changed PDFs
        run: |
          PDF_FILES=$(git diff --name-only origin/main...HEAD | grep -i '\.pdf$' || true)
          if [ -n "$PDF_FILES" ]; then
            uv run python scripts/pii_scan.py --files $PDF_FILES
          else
            echo "No PDF changes, skipping PII scan"
          fi

      - name: Build sharing graph, map, and findings PDF
        run: |
          uv run python scripts/build_sharing_graph.py &
          uv run python scripts/build_map.py &
          uv run python scripts/md_to_pdf.py &
          wait

      - name: Run smoke tests
        run: uv run pytest tests/test_map_smoke.py -v
