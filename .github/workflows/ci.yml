name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Install Tesseract (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr antiword
          version: 1.1

      - name: Generate text sidecars for changed assets
        run: |
          ASSET_FILES=$(git diff --name-only origin/main...HEAD -- 'assets/' | grep -iE '\.(pdf|doc)$' || true)
          if [ -n "$ASSET_FILES" ]; then
            uv run python scripts/ocr_sidecar.py --files $ASSET_FILES
          else
            echo "No PDF/DOC changes in assets/, skipping text sidecars"
          fi

      - name: Commit OCR sidecars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'assets/**/*.txt'
          if git diff --cached --quiet; then
            echo "No new sidecars to commit"
          else
            git commit -m "chore: generate text sidecars for new assets"
            git push
          fi

      - name: PII scan on changed PDFs
        run: |
          PDF_FILES=$(git diff --name-only origin/main...HEAD | grep -i '\.pdf$' || true)
          if [ -n "$PDF_FILES" ]; then
            uv run python scripts/pii_scan.py --files $PDF_FILES
          else
            echo "No PDF changes, skipping PII scan"
          fi

      - name: Build sharing graph, map, scoreboard, report data, and findings PDF
        run: |
          uv run python scripts/build_sharing_graph.py
          uv run python scripts/build_map.py &
          uv run python scripts/build_scoreboard.py &
          uv run python scripts/build_report_data.py &
          uv run python scripts/md_to_pdf.py &
          wait

      - name: Run smoke tests
        run: uv run pytest tests/test_map_smoke.py -v

      - name: Check recipient coordinates
        run: |
          if ! uv run python scripts/check_recipient_coords.py > /tmp/coord-check.txt 2>&1; then
            cat /tmp/coord-check.txt
            echo "has_missing=true" >> "$GITHUB_ENV"
          else
            cat /tmp/coord-check.txt
          fi

      - name: Open issue for missing coordinates
        if: env.has_missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/coord-check.txt)
          # Don't duplicate — check for an existing open issue
          EXISTING=$(gh issue list --label geocoding --state open --json number -q '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Updated from CI run:

          \`\`\`
          $BODY
          \`\`\`"
          else
            gh issue create \
              --title "Recipients missing coordinates in agency registry" \
              --label geocoding \
              --body "The following agencies receive data from public agencies but have no lat/lng in the registry:

          \`\`\`
          $BODY
          \`\`\`

          Add coordinates to \`assets/agency_registry.json\` so they appear on the sharing map."
          fi

      - name: Screenshot pages
        run: uv run python scripts/screenshot_pages.py --out /tmp/screenshots

      - name: Publish screenshots & comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          BRANCH="preview-assets/pr-${PR_NUM}"

          # Push screenshots to an ephemeral branch (no CI trigger —
          # workflows only fire on PRs to main, not branch pushes)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "${BRANCH}"
          git rm -rf --quiet .
          cp /tmp/screenshots/*.png .
          git add *.png
          git commit -m "page preview screenshots for PR #${PR_NUM}"
          git push origin "${BRANCH}" --force

          SHA=$(git rev-parse HEAD)
          RAW="https://raw.githubusercontent.com/${REPO}/${SHA}"

          # Delete previous preview comments
          gh api "repos/${REPO}/issues/${PR_NUM}/comments" --paginate -q \
            '.[] | select(.body | contains("<!-- page-preview -->")) | .id' | \
            while read -r cid; do
              gh api -X DELETE "repos/${REPO}/issues/comments/${cid}" || true
            done

          # Build comment with inline images
          BODY="<!-- page-preview -->
          ## Page Preview

          ### index
          ![index](${RAW}/index.png)

          ### sharing map
          ![sharing_map](${RAW}/sharing_map.png)

          ### scoreboard
          ![scoreboard](${RAW}/scoreboard.png)

          ### per-agency report (SMPD)
          ![report_san-mateo-ca-pd](${RAW}/report_san-mateo-ca-pd.png)

          *Updated $(date -u +%Y-%m-%dT%H:%M:%SZ)*
          "

          gh pr comment "${PR_NUM}" --body "${BODY}"

          # Return to PR branch for any subsequent steps
          git checkout "${{ github.head_ref }}"
