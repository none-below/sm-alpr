name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Install Chromium for Playwright
        run: uv run playwright install chromium

      - name: Install Tesseract
        run: sudo apt-get install -y tesseract-ocr

      - name: Parse transparency portal data
        run: uv run python scripts/flock_transparency.py parse

      - name: Build sharing graph
        run: uv run python scripts/build_sharing_graph.py

      - name: Build map
        run: uv run python scripts/build_map.py

      - name: Build findings PDF
        run: uv run python scripts/md_to_pdf.py

      - name: Run smoke tests
        run: uv run pytest tests/test_map_smoke.py -v

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
