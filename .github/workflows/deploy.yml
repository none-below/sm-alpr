name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Install Tesseract (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr
          version: 1.0

      - name: Build sharing graph, map, and findings PDF
        run: |
          uv run python scripts/build_sharing_graph.py &
          uv run python scripts/build_map.py &
          uv run python scripts/md_to_pdf.py &
          wait

      - name: Run smoke tests
        run: uv run pytest tests/test_map_smoke.py -v

      - name: Check if findings changed
        id: findings-changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^(docs/SMPD_ALPR_Findings\.md|scripts/md_to_pdf\.py)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create findings release
        if: steps.findings-changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="findings-$(date -u +%Y%m%d-%H%M%S)"
          SUBJECT=$(head -1 docs/SMPD_ALPR_Findings.md | sed 's/^# //')
          gh release create "$TAG" \
            docs/SMPD_ALPR_Findings.pdf \
            --title "$SUBJECT — $(date -u +%Y-%m-%d)" \
            --notes "Auto-generated from docs/SMPD_ALPR_Findings.md at commit ${{ github.sha }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
