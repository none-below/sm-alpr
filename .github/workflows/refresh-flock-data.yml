name: Refresh Flock Transparency Data

on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of agencies to refresh'
        default: '3'
      max_age:
        description: 'Re-crawl if older than N days'
        default: '7'

concurrency:
  group: flock-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up refresh branch
        run: |
          git fetch origin flock-refresh || true
          if git rev-parse --verify origin/flock-refresh >/dev/null 2>&1; then
            git checkout flock-refresh
            git rebase origin/main || { git rebase --abort; git reset --hard origin/main; }
          else
            git checkout -b flock-refresh
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Crawl oldest agencies
        run: |
          uv run python scripts/flock_transparency.py crawl \
            --all \
            --batch ${{ inputs.batch_size || '3' }} \
            --max-age ${{ inputs.max_age || '7' }} \
            --delay 1

      - name: Parse new data
        run: uv run python scripts/flock_transparency.py parse

      - name: Install Tesseract (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr
          version: 1.0

      - name: Validate build outputs
        run: |
          uv run python scripts/build_sharing_graph.py &
          uv run python scripts/build_map.py &
          uv run python scripts/md_to_pdf.py &
          wait
          uv run pytest tests/test_map_smoke.py -v

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/transparency.flocksafety.com/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh flock transparency data (batch of ${{ inputs.batch_size || '3' }})"
          git push origin flock-refresh

      - name: Report validate status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$sha \
            -f state=success \
            -f context=validate \
            -f description="Validated by refresh workflow"

      - name: Generate diff summary
        id: diff
        run: |
          slugs=$(git diff HEAD~1 --name-only -- 'assets/transparency.flocksafety.com/' \
            | sed 's|assets/transparency.flocksafety.com/||' | cut -d/ -f1 | sort -u)
          summary=$(uv run python scripts/diff_scrapes.py $slugs)
          echo "$summary"
          {
            echo 'DIFF_SUMMARY<<EOF'
            echo "$summary"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head flock-refresh --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "$(cat <<'EOF'
          ### Refresh batch — ${{ inputs.batch_size || '3' }} agencies

          ```
          ${{ steps.diff.outputs.DIFF_SUMMARY }}
          ```
          EOF
          )"
          else
            gh pr create \
              --title "chore: refresh flock transparency data" \
              --body "$(cat <<EOF
          Automated rolling refresh of Flock Safety transparency portal data.

          This PR accumulates hourly batches. Merge when ready — the next run will create a fresh branch from main.

          ### Initial batch

          \`\`\`
          ${{ steps.diff.outputs.DIFF_SUMMARY }}
          \`\`\`
          EOF
          )" \
              --head flock-refresh \
              --base main
          fi
