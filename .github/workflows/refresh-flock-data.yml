name: Refresh Flock Transparency Data

on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of agencies to refresh (ignored when slugs set)'
        default: '3'
      max_age:
        description: 'Re-crawl if older than N days (ignored when slugs set)'
        default: '7'
      slugs:
        description: 'Specific slug(s) to crawl, space-separated. Bypasses --all/--batch/--max-age when set.'
        default: ''

concurrency:
  group: flock-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Using a PAT (if configured) makes git push + gh pr create attribute
          # to the PAT owner, so the resulting pull_request event's
          # triggering_actor is a human. Without this, GITHUB_TOKEN-authored
          # events get triggering_actor=github-actions[bot], which trips the
          # "approval required for non-committers" setting on every run.
          token: ${{ secrets.REFRESH_PAT || github.token }}

      - name: Set up refresh branch
        run: |
          git fetch origin flock-refresh || true
          if git rev-parse --verify origin/flock-refresh >/dev/null 2>&1; then
            git checkout flock-refresh
            git rebase origin/main || { git rebase --abort; git reset --hard origin/main; }
          else
            git checkout -b flock-refresh
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Crawl oldest agencies
        run: |
          if [ -n "${{ inputs.slugs }}" ]; then
            # shellcheck disable=SC2086
            uv run python scripts/flock_transparency.py crawl \
              ${{ inputs.slugs }} \
              --delay 1
          else
            uv run python scripts/flock_transparency.py crawl \
              --all \
              --batch ${{ inputs.batch_size || '3' }} \
              --max-age ${{ inputs.max_age || '7' }} \
              --delay 1
          fi

      - name: Parse new data
        run: uv run python scripts/flock_transparency.py parse

      - name: Install Tesseract (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: tesseract-ocr
          version: 1.0

      - name: Update registry with new agencies
        run: uv run python scripts/build_agency_registry.py --merge

      - name: Validate build outputs
        run: |
          uv run python scripts/build_sharing_graph.py
          uv run python scripts/build_map.py &
          uv run python scripts/build_report_data.py &
          uv run python scripts/md_to_pdf.py &
          wait
          uv run pytest tests/test_map_smoke.py -v

      - name: Check recipient coordinates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! uv run python scripts/check_recipient_coords.py > /tmp/coord-check.txt 2>&1; then
            cat /tmp/coord-check.txt
            BODY=$(cat /tmp/coord-check.txt)
            EXISTING=$(gh issue list --label geocoding --state open --json number -q '.[0].number' || true)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "Updated from flock refresh:

          \`\`\`
          $BODY
          \`\`\`"
            else
              gh issue create \
                --title "Recipients missing coordinates in agency registry" \
                --label geocoding \
                --body "The following agencies receive data from public agencies but have no lat/lng in the registry:

          \`\`\`
          $BODY
          \`\`\`

          Add coordinates to \`assets/agency_registry.json\` so they appear on the sharing map."
            fi
          else
            cat /tmp/coord-check.txt
          fi

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/transparency.flocksafety.com/ assets/agency_registry.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore: refresh flock transparency data (batch of ${{ inputs.batch_size || '3' }})"
          git push --force-with-lease origin flock-refresh

      - name: Report validate status
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$sha \
            -f state=success \
            -f context=validate \
            -f description="Validated by refresh workflow"

      - name: Generate diff summary
        if: steps.commit.outputs.has_changes == 'true'
        id: diff
        run: |
          slugs=$(git diff HEAD~1 --name-only -- 'assets/transparency.flocksafety.com/' \
            | sed 's|assets/transparency.flocksafety.com/||' | cut -d/ -f1 | sort -u)
          summary=$(uv run python scripts/diff_scrapes.py $slugs)
          echo "$summary"
          {
            echo 'DIFF_SUMMARY<<EOF'
            echo "$summary"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          # Use the PAT (if set) so the PR is created by a human identity,
          # which keeps the next CI run on this PR from requiring manual
          # approval. Falls back to GITHUB_TOKEN when PAT isn't configured.
          GH_TOKEN: ${{ secrets.REFRESH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head flock-refresh --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "$(cat <<'EOF'
          ### Refresh batch — ${{ inputs.batch_size || '3' }} agencies

          ```
          ${{ steps.diff.outputs.DIFF_SUMMARY }}
          ```
          EOF
          )"
          else
            gh pr create \
              --title "chore: refresh flock transparency data" \
              --body "$(cat <<EOF
          Automated rolling refresh of Flock Safety transparency portal data.

          This PR accumulates hourly batches. Merge when ready — the next run will create a fresh branch from main.

          ### Initial batch

          \`\`\`
          ${{ steps.diff.outputs.DIFF_SUMMARY }}
          \`\`\`
          EOF
          )" \
              --head flock-refresh \
              --base main
          fi
