<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://gc.zgo.at; connect-src 'self' https://gc.zgo.at https://none-below.goatcounter.com;">
<title>ALPR Sharing Scoreboard — California</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .header h1 {
    font-size: 28px;
    color: #f8fafc;
    margin-bottom: 8px;
  }
  .header p {
    color: #94a3b8;
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
  }
  .header a { color: #60a5fa; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px 40px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #334155;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 4px;
  }
  .card-subtitle {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 20px;
  }
  .podium {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .podium-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .medal {
    font-size: 28px;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }
  .agency-info {
    flex: 1;
    min-width: 0;
  }
  .agency-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agency-name a {
    color: #f1f5f9;
    text-decoration: none;
  }
  .agency-name a:hover {
    color: #60a5fa;
    text-decoration: underline;
  }
  .agency-value {
    font-size: 12px;
    color: #94a3b8;
  }
  .value-bar-wrap {
    height: 6px;
    background: #334155;
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }
  .value-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .rank-1 .value-bar { background: #eab308; }
  .rank-2 .value-bar { background: #9ca3af; }
  .rank-3 .value-bar { background: #b45309; }
  .empty-state {
    color: #475569;
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 12px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 13px;
  }
  .back-link:hover { text-decoration: underline; }
  .disclaimers {
    max-width: 700px;
    margin: 0 auto 8px;
    padding: 0 20px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
  }
  .disclaimers ul {
    margin: 8px 0 0 20px;
    padding: 0;
    list-style: disc;
  }
  .disclaimers li { margin-bottom: 4px; }
  .disclaimers .stat { color: #e2e8f0; font-weight: 600; }
  .no-sharing-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #334155;
  }
  .no-sharing-card .card-title { margin-bottom: 4px; }
  .no-sharing-card .card-subtitle { margin-bottom: 16px; }
  .no-sharing-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .no-sharing-list li {
    font-size: 13px;
    color: #cbd5e1;
    padding: 4px 0;
    border-bottom: 1px solid #334155;
  }
  .no-sharing-list li:last-child { border-bottom: none; }
  .no-sharing-list a {
    color: #cbd5e1;
    text-decoration: none;
  }
  .no-sharing-list a:hover {
    color: #60a5fa;
    text-decoration: underline;
  }
  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <a class="back-link" href="index.html">&larr; Back to investigation</a>
  <h1>ALPR Sharing Scoreboard</h1>
  <p>Top 3 California agencies in each category, based on data from
    <a href="sharing_map.html">Flock Safety transparency portals</a>.</p>
</div>

<div class="disclaimers" id="disclaimers"></div>

<div class="grid" id="grid"></div>

<script>
var MEDALS = {1: '&#x1F947;', 2: '&#x1F948;', 3: '&#x1F949;'};

function formatValue(id, value) {
  if (value == null) return '—';
  if (id === 'retention') return value.toLocaleString() + ' days';
  if (id === 'vehicles_30d') return value.toLocaleString() + ' plates';
  if (id === 'searches_30d') return value.toLocaleString() + ' lookups';
  if (id === 'cameras') return value.toLocaleString() + ' cameras';
  return value.toLocaleString();
}

function renderCategory(cat) {
  var card = document.createElement('div');
  card.className = 'card';

  var maxVal = cat.podium.length > 0 ? cat.podium[0].value : 1;

  var html = '<div class="card-title">' + cat.title + '</div>' +
    '<div class="card-subtitle">' + cat.subtitle + '</div>' +
    '<div class="podium">';

  if (cat.podium.length === 0) {
    html += '<div class="empty-state">No data available</div>';
  } else {
    for (var i = 0; i < cat.podium.length; i++) {
      var p = cat.podium[i];
      var pct = Math.round((p.value / maxVal) * 100);
      html += '<div class="podium-row rank-' + p.rank + '">' +
        '<div class="medal">' + (MEDALS[p.rank] || '') + '</div>' +
        '<div class="agency-info">' +
          '<div class="agency-name" title="' + p.name + '"><a href="sharing_map.html#' + encodeURIComponent(p.slug) + '" target="_blank">' + p.name + '</a></div>' +
          '<div class="agency-value">' + formatValue(cat.id, p.value) + '</div>' +
          '<div class="value-bar-wrap"><div class="value-bar" style="width:' + pct + '%"></div></div>' +
        '</div>' +
      '</div>';
    }
  }

  html += '</div>';
  card.innerHTML = html;
  return card;
}

function renderDisclaimers(meta) {
  var html = '<ul>';
  html += '<li>Only <strong>California</strong> agencies are ranked.</li>';
  html += '<li>Only agencies with a visible Flock Safety transparency portal are included &mdash; '
    + '<span class="stat">' + meta.agencies_crawled + '</span> of '
    + '<span class="stat">' + meta.agencies_in_registry + '</span> known California Flock agencies.</li>';
  html += '<li><span class="stat">' + meta.agencies_no_portal
    + '</span> California agencies appear in other agencies\u2019 sharing lists but have no findable transparency portal.</li>';
  html += '</ul>';
  return html;
}

function renderListCard(title, subtitle, list) {
  if (!list || list.length === 0) return null;
  var card = document.createElement('div');
  card.className = 'no-sharing-card';
  var html = '<div class="card-title">' + title + '</div>'
    + '<div class="card-subtitle">' + subtitle + '</div>'
    + '<ul class="no-sharing-list">';
  for (var i = 0; i < list.length; i++) {
    html += '<li><a href="sharing_map.html#' + encodeURIComponent(list[i].slug)
      + '" target="_blank">' + list[i].name + '</a></li>';
  }
  html += '</ul>';
  card.innerHTML = html;
  return card;
}

function renderNoSharingCard(list) {
  return renderListCard(
    'Transparency Gaps',
    list.length + ' agencies have a portal but publish no sharing data',
    list
  );
}

fetch('data/scoreboard_data.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    // Render disclaimers
    if (data.meta) {
      document.getElementById('disclaimers').innerHTML = renderDisclaimers(data.meta);
    }

    var grid = document.getElementById('grid');
    for (var i = 0; i < data.categories.length; i++) {
      grid.appendChild(renderCategory(data.categories[i]));
    }

    // Render no-sharing card at the end
    var noSharingCard = renderNoSharingCard(data.no_sharing_published);
    if (noSharingCard) {
      grid.appendChild(noSharingCard);
    }

    // Render no-portal card from map data
    fetch('data/map_data.json')
      .then(function(r) { return r.json(); })
      .then(function(mapData) {
        var noPortal = [];
        var ai = mapData.agencyInfo || {};
        for (var slug in ai) {
          var info = ai[slug];
          if (info.state === 'CA' && !info.crawled && info.public !== false
              && info.type !== 'test' && info.type !== 'decommissioned') {
            noPortal.push({ slug: slug, name: info.name || slug });
          }
        }
        noPortal.sort(function(a, b) { return a.name.localeCompare(b.name); });
        var card = renderListCard(
          'No Transparency Portal',
          noPortal.length + ' California agencies appear in sharing lists but have no findable portal',
          noPortal
        );
        if (card) grid.appendChild(card);
      });
  })
  .catch(function(err) {
    document.getElementById('grid').innerHTML =
      '<div style="color:#ef4444;padding:20px;">Failed to load scoreboard data.</div>';
  });
</script>

<script data-goatcounter="https://none-below.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
